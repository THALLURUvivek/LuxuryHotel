<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sign In | Paradise Cove Resort</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/sigin.css">

</head>

<body>

    <section class="signin-section">

        <div class="overlay"></div>

        <div class="container">

            <div class="row justify-content-center align-items-center min-vh-100">

                <div class="col-lg-5 col-md-8">

                    <div class="signin-card">

                        <a href="index.html" class="back-home-link">
                            <i class="bi bi-arrow-left"></i> Back to Home
                        </a>

               <div class="text-center mb-4">

    <a href="index.html">
        <img
            src="images/image.png"
            class="signin-logo"
            alt="Paradise Cove Resort Logo">
    </a>

    <h2>Welcome Back</h2>

    <p>Sign in to continue your luxury experience</p>

</div>
                        <form id="signinForm">

                            <div class="mb-4">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="Enter Email">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="password-wrapper">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        placeholder="Enter Password">

                                    <span id="togglePassword">

                                        <i class="bi bi-eye"></i>

                                    </span>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Login As
                                </label>

                                <select
                                    id="loginRole"
                                    class="form-select">
                                    <option value="guest" selected>
                                        Guest
                                    </option>
                                    <option value="staff">
                                        Staff
                                    </option>
                                    <option value="admin">
                                        Admin
                                    </option>
                                </select>

                            </div>

                            <div class="d-flex justify-content-between mb-4">

                                <div>

                                    <input
                                        type="checkbox"
                                        id="remember">

                                    <label for="remember">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="error.html"
                                    class="forgot-link">

                                    Forgot Password?

                                </a>

                            </div>

                            <button
                                type="submit"
                                class="btn signin-btn">

                                Sign In

                            </button>

                        </form>

                        <div class="social-login">

                            <p>
                                Or Continue With
                            </p>

                            <div class="social-icons">

                                <a href="error.html">
                                    <i class="bi bi-google"></i>
                                </a>

                                <a href="error.html"><i class="bi bi-facebook"></i>
                                </a>

                                <a href="error.html"><i class="bi bi-twitter-x"></i>
                                </a>

                            </div>

                        </div>

                        <div class="signup-link">

                            Don't have an account?

                            <a href="signup.html">

                                Create Account

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/signin.js"></script>

</body>

</html>
