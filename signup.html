<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Account | Paradise Cove Resort</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/signup.css">

</head>

<body>

    <section class="signup-section">

        <div class="overlay"></div>

        <div class="container">

            <div class="row justify-content-center align-items-center min-vh-100">

                <div class="col-lg-6 col-md-8">

                    <div class="signup-card">

                        <div class="text-center mb-4">

    <img
        src="images/image.png"
        class="signup-logo"
        alt="Paradise Cove Resort">

    <h2>Create Account</h2>

    <p>Join Paradise Cove Resort Membership</p>

</div>

                        <form id="signupForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    id="fullName"
                                    class="form-control"
                                    placeholder="Enter Full Name">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    placeholder="Enter Email">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="tel"
                                    id="phone"
                                    class="form-control"
                                    placeholder="Enter Phone Number">

                            </div>
                                                        <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="password-wrapper">

                                    <input
                                        type="password"
                                        id="password"
                                        class="form-control"
                                        placeholder="Create Password">

                                    <span id="togglePassword">

                                        <i class="bi bi-eye"></i>

                                    </span>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    id="confirmPassword"
                                    class="form-control"
                                    placeholder="Confirm Password">

                            </div>

                            <div class="mb-4">

                                <input
                                    type="checkbox"
                                    id="terms">

                                <label for="terms">

                                    I agree to the Terms &
                                    Conditions

                                </label>

                            </div>

                            <button
                                type="submit"
                                class="btn signup-btn">

                                Create Account

                            </button>

                        </form>
                                                <div class="social-signup">

                            <p>
                                Or Sign Up With
                            </p>

                            <div class="social-icons">

                                <a href="#">
                                    <i class="bi bi-google"></i>
                                </a>

                                <a href="#">
                                    <i class="bi bi-facebook"></i>
                                </a>

                                <a href="#">
                                    <i class="bi bi-twitter-x"></i>
                                </a>

                            </div>

                        </div>

                        <div class="signin-link">

                            Already have an account?

                            <a href="signinpage.html">

                                Sign In

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="js/signup.js"></script>

</body>

</html>
